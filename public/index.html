<!DOCTYPE html>
<html lang="ja" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#F5F5F4">
<title>定時までカウントダウン - あと¥○○稼げば帰れる</title>
<meta name="description" content="終業時刻と時給を入れるだけで、定時まで残り時間と追加で稼げる金額をリアルタイム表示。残業時は割増1.25倍で加算。">
<meta property="og:title" content="定時までカウントダウン">
<meta property="og:description" content="あと¥○○稼げば帰れます。">
<meta property="og:type" content="website">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F5F5F4;
  --surface: #FFFFFF;
  --surface-2: #EFEEEC;
  --surface-3: #E7E5E4;
  --border: #D6D3D1;
  --border-strong: #A8A29E;
  --text: #0A0A0A;
  --text-2: #262626;
  --dim: #57534E;
  --dim-2: #78716C;
  --primary: #0A0A0A;
  --accent: #0A0A0A;
  --success: #047857;
  --danger: #B91C1C;
  --warning: #B45309;
  --radius-sm: 4px;
  --radius: 6px;
  --radius-lg: 10px;
  --shadow-sm: 0 1px 0 rgba(10,10,10,0.04);
  --shadow: 0 1px 2px rgba(10,10,10,0.04);
  --shadow-lg: 0 8px 24px -8px rgba(10,10,10,0.12);
  --duration: 160ms;
  --ease: cubic-bezier(0.2, 0, 0, 1);
  --font-sans: "Inter", "Noto Sans JP", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  --font-num: "JetBrains Mono", "Inter", ui-monospace, SFMono-Regular, Menlo, monospace;
  --font-mono: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
  --tap: 48px;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

[data-theme="dark"] {
  --bg: #0A0A0A;
  --surface: #141414;
  --surface-2: #1A1A1A;
  --surface-3: #222222;
  --border: #2A2A2A;
  --border-strong: #3F3F3F;
  --text: #FAFAFA;
  --text-2: #E5E5E5;
  --dim: #A3A3A3;
  --dim-2: #737373;
  --primary: #FAFAFA;
  --accent: #FAFAFA;
  --success: #34D399;
  --danger: #F87171;
  --warning: #FBBF24;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-text-size-adjust: 100%; }
html, body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-sans);
  font-size: 15px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  font-feature-settings: "cv11", "ss01", "ss03";
  letter-spacing: -0.005em;
  overscroll-behavior-y: none;
}
body {
  min-height: 100vh;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  padding-top: var(--safe-top);
  padding-bottom: var(--safe-bottom);
}
button { font-family: inherit; font-size: inherit; cursor: pointer; background: none; border: none; color: inherit; }
input, select { font-family: inherit; font-size: inherit; color: inherit; }
.tnum { font-variant-numeric: tabular-nums; }

.app {
  flex: 1;
  display: flex;
  flex-direction: column;
  max-width: 540px;
  width: 100%;
  margin: 0 auto;
  padding: clamp(12px, 4vw, 20px) clamp(16px, 5vw, 28px) 48px;
}

.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 4px 0 clamp(24px, 6vw, 40px);
}
.brand {
  display: flex;
  align-items: center;
  gap: 10px;
  font-weight: 600;
  font-size: 13px;
  letter-spacing: -0.01em;
  color: var(--text);
}
.brand-mark {
  width: 28px; height: 28px;
  border-radius: var(--radius-sm);
  background: var(--text);
  color: var(--bg);
  display: grid;
  place-items: center;
  font-size: 13px;
  font-weight: 700;
  font-family: var(--font-num);
  letter-spacing: -0.02em;
}
.brand-meta {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--dim);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-left: 2px;
}
.icon-btn {
  width: var(--tap); height: var(--tap);
  display: grid;
  place-items: center;
  border-radius: var(--radius);
  color: var(--dim);
  transition: background var(--duration) var(--ease), color var(--duration) var(--ease);
  -webkit-tap-highlight-color: transparent;
}
.icon-btn:hover { background: var(--surface-2); color: var(--text); }
.icon-btn:active { background: var(--surface-3); }
.icon-btn svg { width: 18px; height: 18px; }

.screen {
  flex: 1;
  display: flex;
  flex-direction: column;
  animation: fadeIn 240ms var(--ease);
}
.screen[hidden] { display: none; }
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(4px); }
  to { opacity: 1; transform: none; }
}

.hero { margin-bottom: clamp(28px, 7vw, 40px); }
.hero-eyebrow {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--dim);
  margin-bottom: 14px;
  display: inline-flex;
  align-items: center;
  gap: 8px;
}
.hero-eyebrow::before {
  content: "";
  width: 18px; height: 1px;
  background: var(--border-strong);
}
.hero h1 {
  font-size: clamp(28px, 7.5vw, 36px);
  font-weight: 800;
  letter-spacing: -0.035em;
  line-height: 1.05;
  margin-bottom: 12px;
  color: var(--text);
}
.hero p {
  font-size: clamp(14px, 3.8vw, 15px);
  color: var(--dim);
  max-width: 40ch;
  line-height: 1.6;
}

.field { margin-bottom: 22px; }
.field-label {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 500;
  color: var(--dim);
  margin-bottom: 10px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
}
.field-label .req {
  font-family: var(--font-sans);
  font-size: 10px;
  color: var(--dim-2);
  text-transform: none;
  letter-spacing: 0;
  font-weight: 400;
}
.field-hint {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--dim-2);
  margin-top: 10px;
  letter-spacing: 0;
}

.preset-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
  margin-bottom: 10px;
}
.preset {
  min-height: 60px;
  padding: 10px 14px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  text-align: left;
  transition: border-color var(--duration) var(--ease), background var(--duration) var(--ease);
  display: flex;
  flex-direction: column;
  gap: 2px;
  -webkit-tap-highlight-color: transparent;
}
.preset:hover { border-color: var(--border-strong); }
.preset:active { background: var(--surface-2); }
.preset[aria-pressed="true"] {
  border-color: var(--text);
  background: var(--surface);
  box-shadow: inset 0 0 0 1px var(--text);
}
.preset-title {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--dim);
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.08em;
}
.preset-val {
  font-family: var(--font-num);
  font-size: 15px;
  font-weight: 700;
  color: var(--text);
  font-variant-numeric: tabular-nums;
  letter-spacing: -0.02em;
}

.input-wrap {
  position: relative;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  transition: border-color var(--duration) var(--ease);
}
.input-wrap:focus-within { border-color: var(--text); }
.input-wrap input {
  width: 100%;
  height: var(--tap);
  padding: 0 14px 0 32px;
  border: none;
  background: transparent;
  outline: none;
  font-size: 16px;
  font-weight: 600;
  font-family: var(--font-num);
  font-variant-numeric: tabular-nums;
  letter-spacing: -0.01em;
}
.input-prefix {
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--dim);
  font-weight: 500;
  pointer-events: none;
  font-family: var(--font-num);
}
.input-wrap.no-prefix input { padding-left: 14px; }

.time-input {
  width: 100%;
  height: var(--tap);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--surface);
  padding: 0 14px;
  font-family: var(--font-num);
  font-size: 18px;
  font-weight: 600;
  font-variant-numeric: tabular-nums;
  letter-spacing: -0.02em;
  outline: none;
  transition: border-color var(--duration) var(--ease);
  color: var(--text);
  color-scheme: light dark;
}
.time-input:focus { border-color: var(--text); }

.btn {
  width: 100%;
  min-height: 52px;
  padding: 0 20px;
  border-radius: var(--radius);
  font-size: 15px;
  font-weight: 600;
  letter-spacing: -0.01em;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  transition: background var(--duration) var(--ease), border-color var(--duration) var(--ease), color var(--duration) var(--ease), transform 80ms var(--ease);
  user-select: none;
  -webkit-tap-highlight-color: transparent;
  position: relative;
  font-family: var(--font-sans);
}
.btn:active { transform: scale(0.985); }

.btn-primary { background: var(--text); color: var(--bg); }
.btn-primary:hover { background: var(--text-2); }
[data-theme="dark"] .btn-primary { background: var(--text); color: var(--bg); }
[data-theme="dark"] .btn-primary:hover { background: var(--text-2); }

.btn-secondary {
  background: var(--surface);
  color: var(--text);
  border: 1px solid var(--border);
}
.btn-secondary:hover { background: var(--surface-2); border-color: var(--border-strong); }

.btn .btn-arrow {
  margin-left: auto;
  opacity: 0.6;
  transition: transform var(--duration) var(--ease), opacity var(--duration) var(--ease);
}
.btn:hover .btn-arrow { opacity: 1; transform: translateX(2px); }

.btn-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

/* ============================================
   COUNTDOWN SCREEN
   ============================================ */
.countdown-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: clamp(40px, 10vw, 56px) clamp(20px, 6vw, 32px) clamp(32px, 8vw, 44px);
  text-align: center;
  margin-bottom: 16px;
  position: relative;
  overflow: hidden;
}
.countdown-card::before {
  content: "";
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--text), transparent);
  opacity: 0.3;
}
.countdown-card.overtime::before {
  background: linear-gradient(90deg, transparent, var(--warning), transparent);
  opacity: 0.5;
}
.countdown-label {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.14em;
  color: var(--dim);
  margin-bottom: 16px;
}
.countdown-card.overtime .countdown-label { color: var(--warning); }

.countdown-time {
  font-family: var(--font-num);
  font-size: clamp(40px, 13vw, 60px);
  font-weight: 700;
  letter-spacing: -0.04em;
  line-height: 0.95;
  font-variant-numeric: tabular-nums;
  margin-bottom: 18px;
  color: var(--text);
}

.countdown-amount {
  font-family: var(--font-num);
  font-size: clamp(22px, 6vw, 30px);
  font-weight: 700;
  letter-spacing: -0.02em;
  font-variant-numeric: tabular-nums;
  color: var(--text);
  margin-bottom: 10px;
}
.countdown-amount .yen {
  font-size: 0.55em;
  font-weight: 400;
  color: var(--dim);
  margin-right: 0.12em;
  vertical-align: 0.22em;
  letter-spacing: 0;
}
.countdown-amount-label {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--dim);
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.progress-wrap {
  margin-top: 24px;
  padding-top: 20px;
  border-top: 1px solid var(--border);
}
.progress-meta {
  display: flex;
  justify-content: space-between;
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--dim-2);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 8px;
}
.progress-bar {
  height: 4px;
  background: var(--surface-2);
  border-radius: 2px;
  overflow: hidden;
  position: relative;
}
.progress-fill {
  position: absolute;
  top: 0; left: 0; bottom: 0;
  background: var(--text);
  transition: width 400ms var(--ease);
  border-radius: 2px;
}
.countdown-card.overtime .progress-fill { background: var(--warning); }

.stats-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 16px;
}
.stat {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
}
.stat-label {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--dim);
  margin-bottom: 6px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.08em;
}
.stat-val {
  font-family: var(--font-num);
  font-size: 20px;
  font-weight: 600;
  font-variant-numeric: tabular-nums;
  letter-spacing: -0.03em;
}

.footer {
  margin-top: auto;
  padding-top: 40px;
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--dim-2);
  text-align: center;
  text-transform: uppercase;
  letter-spacing: 0.1em;
}
.footer a {
  color: var(--dim);
  text-decoration: none;
  transition: color var(--duration) var(--ease);
}
.footer a:hover { color: var(--text); }

.toast {
  position: fixed;
  bottom: calc(20px + var(--safe-bottom));
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--text);
  color: var(--bg);
  padding: 12px 18px;
  border-radius: var(--radius);
  font-size: 13px;
  font-weight: 500;
  letter-spacing: -0.005em;
  box-shadow: var(--shadow-lg);
  opacity: 0;
  transition: opacity 220ms var(--ease), transform 220ms var(--ease);
  z-index: 100;
  pointer-events: none;
  max-width: calc(100vw - 32px);
}
.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

@media (max-width: 768px) { .app { max-width: 100%; } }

@media (max-width: 480px) {
  :root { --tap: 52px; }
  body { font-size: 14px; }
  .app { padding: 12px 16px 40px; }
  .topbar { padding: 2px 0 22px; }
  .brand { font-size: 12px; gap: 8px; }
  .brand-mark { width: 26px; height: 26px; font-size: 11px; }
  .hero { margin-bottom: 26px; }
  .hero h1 { font-size: clamp(26px, 8.5vw, 32px); letter-spacing: -0.03em; }
  .field { margin-bottom: 20px; }
  .preset-grid { gap: 6px; }
  .preset { min-height: 64px; padding: 12px 14px; }
  .preset-val { font-size: 16px; }
  .countdown-card { padding: 36px 18px 32px; border-radius: 8px; }
  .countdown-time { font-size: clamp(38px, 13vw, 48px); }
  .countdown-amount { font-size: clamp(22px, 6vw, 26px); }
  .stats-grid { gap: 6px; }
  .stat { padding: 12px 14px; }
  .stat-val { font-size: 17px; }
  .btn-row { gap: 6px; }
  .btn { min-height: 54px; font-size: 14.5px; padding: 0 16px; }
  .footer { padding-top: 32px; font-size: 9px; }
}

@media (max-width: 360px) {
  .hero h1 { font-size: 24px; }
  .countdown-time { font-size: 34px; }
  .countdown-amount { font-size: 20px; }
  .btn { font-size: 14px; }
  .preset-val { font-size: 15px; }
}

@media (max-height: 560px) and (orientation: landscape) {
  .hero { margin-bottom: 20px; }
  .hero h1 { font-size: 22px; }
  .countdown-card { padding: 24px 20px; }
  .countdown-time { font-size: 36px; }
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
  }
}

@media (hover: none) {
  .btn-primary:hover { background: var(--text); }
  .btn-secondary:hover { background: var(--surface); border-color: var(--border); }
  .preset:hover { border-color: var(--border); }
  .icon-btn:hover { background: transparent; color: var(--dim); }
}
</style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="brand">
      <div class="brand-mark">⏱</div>
      <span>Clock-Out</span>
      <span class="brand-meta">v1.0</span>
    </div>
    <button class="icon-btn" id="themeToggle" aria-label="テーマ切替">
      <svg id="iconSun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
      <svg id="iconMoon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" hidden><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>
  </header>

  <!-- ========== SETUP ========== -->
  <section class="screen" id="setupScreen">
    <div class="hero">
      <div class="hero-eyebrow">Real-time · Client-side</div>
      <h1>定時まで、<br>あといくら？</h1>
      <p>終業時刻と時給を入れるだけで、定時までの残り時間とそこまでに稼げる金額をリアルタイムで表示します。</p>
    </div>

    <div class="field">
      <label class="field-label" for="endTimeInput">
        <span>終業時刻</span>
        <span class="req">必須</span>
      </label>
      <div class="preset-grid">
        <button type="button" class="preset" data-end="17:00">
          <span class="preset-title">定時 17:00</span>
          <span class="preset-val">17:00</span>
        </button>
        <button type="button" class="preset" data-end="17:30">
          <span class="preset-title">定時 17:30</span>
          <span class="preset-val">17:30</span>
        </button>
        <button type="button" class="preset" data-end="18:00" aria-pressed="true">
          <span class="preset-title">定時 18:00</span>
          <span class="preset-val">18:00</span>
        </button>
        <button type="button" class="preset" data-end="19:00">
          <span class="preset-title">定時 19:00</span>
          <span class="preset-val">19:00</span>
        </button>
      </div>
      <input type="time" id="endTimeInput" class="time-input" value="18:00" aria-label="カスタム終業時刻">
    </div>

    <div class="field">
      <label class="field-label">
        <span>あなたの時給</span>
        <span class="req">必須</span>
      </label>
      <div class="preset-grid">
        <button type="button" class="preset wage-preset" data-wage="1100">
          <span class="preset-title">アルバイト</span>
          <span class="preset-val">¥1,100</span>
        </button>
        <button type="button" class="preset wage-preset" data-wage="1500" aria-pressed="true">
          <span class="preset-title">新卒</span>
          <span class="preset-val">¥1,500</span>
        </button>
        <button type="button" class="preset wage-preset" data-wage="2500">
          <span class="preset-title">一般</span>
          <span class="preset-val">¥2,500</span>
        </button>
        <button type="button" class="preset wage-preset" data-wage="5000">
          <span class="preset-title">管理職</span>
          <span class="preset-val">¥5,000</span>
        </button>
      </div>
      <div class="input-wrap">
        <span class="input-prefix">¥</span>
        <input type="number" id="wageInput" value="1500" min="0" max="999999" inputmode="numeric" aria-label="カスタム時給">
      </div>
      <p class="field-hint">残業は1.25倍で自動計算 · 月給 ÷ 160 ≒ 時給</p>
    </div>

    <button class="btn btn-primary" id="startBtn">
      カウントダウン開始
      <svg class="btn-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
    </button>
  </section>

  <!-- ========== COUNTDOWN ========== -->
  <section class="screen" id="countdownScreen" hidden>
    <div class="countdown-card" id="countdownCard">
      <div class="countdown-label" id="countdownLabel">定時まで</div>
      <div class="countdown-time tnum" id="timeDisplay">00:00:00</div>
      <div class="countdown-amount tnum"><span class="yen">¥</span><span id="amountDisplay">0</span></div>
      <div class="countdown-amount-label" id="amountLabel">あと稼げる金額</div>
      <div class="progress-wrap">
        <div class="progress-meta">
          <span id="progressStart">現在</span>
          <span id="progressEnd">定時 18:00</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill" style="width:0%"></div>
        </div>
      </div>
    </div>

    <div class="stats-grid">
      <div class="stat">
        <div class="stat-label">Your Wage</div>
        <div class="stat-val tnum"><span style="font-size:13px;color:var(--dim);margin-right:2px;font-family:var(--font-mono);font-weight:400;">¥</span><span id="statWage">1,500</span></div>
      </div>
      <div class="stat">
        <div class="stat-label">Now</div>
        <div class="stat-val tnum" id="statNow">--:--</div>
      </div>
    </div>

    <div class="btn-row">
      <button class="btn btn-secondary" id="changeBtn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        設定を変更
      </button>
      <button class="btn btn-secondary" id="shareBtn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
        Xでシェア
      </button>
    </div>
  </section>

  <footer class="footer">
    <a href="https://x.com/otsu_dev" target="_blank" rel="noopener">100 Web Apps Challenge · #14</a>
  </footer>
</div>

<div class="toast" id="toast">コピーしました</div>

<script>
(() => {
  'use strict';

  const state = {
    endTime: '18:00',
    wage: 1500,
    tickId: 0,
  };

  const $ = (id) => document.getElementById(id);
  const setup = $('setupScreen');
  const countdown = $('countdownScreen');
  const endTimeInput = $('endTimeInput');
  const wageInput = $('wageInput');
  const endPresets = document.querySelectorAll('.preset[data-end]');
  const wagePresets = document.querySelectorAll('.wage-preset');
  const card = $('countdownCard');
  const label = $('countdownLabel');
  const timeDisplay = $('timeDisplay');
  const amountDisplay = $('amountDisplay');
  const amountLabel = $('amountLabel');
  const progressFill = $('progressFill');
  const progressEnd = $('progressEnd');
  const statWage = $('statWage');
  const statNow = $('statNow');
  const toast = $('toast');

  const fmt = (n) => Math.floor(n).toLocaleString('ja-JP');
  const fmtHMS = (ms) => {
    const s = Math.max(0, Math.floor(ms / 1000));
    const h = Math.floor(s / 3600);
    const m = Math.floor((s % 3600) / 60);
    const sec = s % 60;
    return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
  };
  const fmtTimeLong = (ms) => {
    const s = Math.floor(ms / 1000);
    const h = Math.floor(s / 3600);
    const m = Math.floor((s % 3600) / 60);
    const sec = s % 60;
    if (h > 0) return `${h}時間${m}分${sec}秒`;
    if (m > 0) return `${m}分${sec}秒`;
    return `${sec}秒`;
  };
  const fmtClock = (d) => `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  const showToast = (msg) => {
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toast._t);
    toast._t = setTimeout(() => toast.classList.remove('show'), 1800);
  };

  // ===== Theme =====
  const themeToggle = $('themeToggle');
  const iconSun = $('iconSun');
  const iconMoon = $('iconMoon');
  const applyTheme = (t) => {
    document.documentElement.setAttribute('data-theme', t);
    iconSun.hidden = t === 'dark';
    iconMoon.hidden = t !== 'dark';
    document.querySelector('meta[name="theme-color"]').setAttribute('content', t === 'dark' ? '#0A0A0A' : '#F5F5F4');
  };
  const savedTheme = localStorage.getItem('coc-theme') ||
    (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
  applyTheme(savedTheme);
  themeToggle.addEventListener('click', () => {
    const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    localStorage.setItem('coc-theme', next);
    applyTheme(next);
  });

  // ===== Setup controls =====
  endPresets.forEach(btn => {
    btn.addEventListener('click', () => {
      endPresets.forEach(b => b.setAttribute('aria-pressed', 'false'));
      btn.setAttribute('aria-pressed', 'true');
      endTimeInput.value = btn.dataset.end;
    });
  });
  endTimeInput.addEventListener('input', () => {
    endPresets.forEach(b => b.setAttribute('aria-pressed', b.dataset.end === endTimeInput.value ? 'true' : 'false'));
  });

  wagePresets.forEach(btn => {
    btn.addEventListener('click', () => {
      wagePresets.forEach(b => b.setAttribute('aria-pressed', 'false'));
      btn.setAttribute('aria-pressed', 'true');
      wageInput.value = btn.dataset.wage;
    });
  });
  wageInput.addEventListener('input', () => {
    wagePresets.forEach(b => b.setAttribute('aria-pressed', 'false'));
  });

  // ===== Restore saved settings =====
  const saved = (() => {
    try { return JSON.parse(localStorage.getItem('coc-settings') || '{}'); } catch { return {}; }
  })();
  if (saved.endTime) {
    endTimeInput.value = saved.endTime;
    endPresets.forEach(b => b.setAttribute('aria-pressed', b.dataset.end === saved.endTime ? 'true' : 'false'));
  }
  if (saved.wage) {
    wageInput.value = saved.wage;
    wagePresets.forEach(b => b.setAttribute('aria-pressed', String(b.dataset.wage) === String(saved.wage) ? 'true' : 'false'));
  }

  // ===== Start =====
  $('startBtn').addEventListener('click', () => {
    state.endTime = endTimeInput.value || '18:00';
    state.wage = Math.max(0, Number(wageInput.value) || 0);
    try {
      localStorage.setItem('coc-settings', JSON.stringify({ endTime: state.endTime, wage: state.wage }));
    } catch {}
    statWage.textContent = fmt(state.wage);
    progressEnd.textContent = `定時 ${state.endTime}`;
    setup.hidden = true;
    countdown.hidden = false;
    window.scrollTo({ top: 0, behavior: 'instant' });
    tick();
    state.tickId = setInterval(tick, 1000);
  });

  // ===== Countdown tick =====
  function getEndDate() {
    const [hh, mm] = state.endTime.split(':').map(Number);
    const d = new Date();
    d.setHours(hh, mm, 0, 0);
    return d;
  }
  function getWorkStartDate(endDate) {
    // 8時間前を仮の始業として進捗計算に使う
    const d = new Date(endDate);
    d.setHours(d.getHours() - 8);
    return d;
  }
  function tick() {
    const now = new Date();
    const end = getEndDate();
    const start = getWorkStartDate(end);
    const diffMs = end - now;
    statNow.textContent = fmtClock(now);

    if (diffMs > 0) {
      // Before clock-out
      card.classList.remove('overtime');
      label.textContent = '定時まで';
      amountLabel.textContent = 'あと稼げる金額';
      timeDisplay.textContent = fmtHMS(diffMs);
      const remaining = state.wage * (diffMs / 3600000);
      amountDisplay.textContent = fmt(remaining);
      const total = end - start;
      const elapsed = Math.max(0, Math.min(total, now - start));
      const pct = total > 0 ? (elapsed / total) * 100 : 0;
      progressFill.style.width = pct.toFixed(2) + '%';
    } else {
      // Overtime
      card.classList.add('overtime');
      label.textContent = '残業中';
      amountLabel.textContent = '残業代（1.25倍）';
      const overMs = -diffMs;
      timeDisplay.textContent = '+' + fmtHMS(overMs);
      const overtimePay = state.wage * 1.25 * (overMs / 3600000);
      amountDisplay.textContent = fmt(overtimePay);
      progressFill.style.width = '100%';
    }
  }

  // ===== Change settings =====
  $('changeBtn').addEventListener('click', () => {
    clearInterval(state.tickId);
    countdown.hidden = true;
    setup.hidden = false;
    window.scrollTo({ top: 0, behavior: 'instant' });
  });

  // ===== Share =====
  $('shareBtn').addEventListener('click', () => {
    const now = new Date();
    const end = getEndDate();
    const diffMs = end - now;
    let text;
    if (diffMs > 0) {
      const remaining = state.wage * (diffMs / 3600000);
      text = `定時まで${fmtTimeLong(diffMs)}。あと¥${fmt(remaining)}稼げば帰れます。\n\n#定時までカウントダウン`;
    } else {
      const overMs = -diffMs;
      const overtimePay = state.wage * 1.25 * (overMs / 3600000);
      text = `残業${fmtTimeLong(overMs)}突入。残業代+¥${fmt(overtimePay)}が積み上がり中。\n\n#定時までカウントダウン`;
    }
    const url = location.origin;
    window.open(
      `https://x.com/intent/post?text=${encodeURIComponent(text)}&url=${encodeURIComponent(url)}`,
      '_blank',
      'noopener'
    );
  });

  // ===== Keyboard =====
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !setup.hidden) {
      $('startBtn').click();
    }
    if (e.key === 'Escape' && !countdown.hidden) {
      $('changeBtn').click();
    }
  });
})();
</script>
</body>
</html>
